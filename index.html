<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mines – Telegram Mini App</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app">


<header class="top">
<div class="logo">1win</div>
<button class="switch">Switch to All</button>
</header>


<div class="board-wrapper">
<div class="board" id="board"></div>
</div>


<div class="controls">
<button class="arrow" id="prev">‹</button>
<span class="traps" id="traps">3 traps</span>
<button class="arrow" id="next">›</button>
</div>


<button class="play" id="play">Play</button>


</div>


<script src="js/app.js"></script>
</body>
</html>
